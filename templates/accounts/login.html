{% extends "base.html" %}
{% block title %}Log in — LuminPrompt{% endblock %}

{% block content %}
<div class="rounded-xl p-8 border" style="background: var(--panel); border-color: var(--panel-border);">
    <h1 class="font-display text-2xl font-semibold mb-6">Welcome back</h1>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="block text-sm mb-1.5" style="color: var(--text-muted);">
                    {{ field.label }}
                </label>
                <input
                    type="{{ field.field.widget.input_type }}"
                    name="{{ field.html_name }}"
                    id="{{ field.id_for_label }}"
                    class="w-full rounded-lg px-4 py-2.5 border transition focus:outline-none"
                    style="background: var(--bg); border-color: var(--panel-border); color: var(--text);"
                    onfocus="this.style.borderColor='var(--amber)'"
                    onblur="this.style.borderColor='var(--panel-border)'"
                >
                {% for error in field.errors %}
                    <p class="text-xs mt-1" style="color: var(--danger);">{{ error }}</p>
                {% endfor %}
            </div>
        {% endfor %}

        <button type="submit"
            class="w-full font-medium py-2.5 rounded-lg transition hover:opacity-90"
            style="background: var(--amber); color: #14110A;">
            Log in
        </button>
    </form>

    <p class="text-center text-sm mt-5" style="color: var(--text-muted);">
        No account?
        <a href="{% url 'register' %}" style="color: var(--cyan);" class="hover:underline">Register</a>
    </p>
</div>
{% endblock %}
