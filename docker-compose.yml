services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: luminprompt
      POSTGRES_USER: luminuser
      POSTGRES_PASSWORD: luminpass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: